<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BytePlus Authentication</title>
  <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 22"><path d="M0 4.93 7.64 1.1v16.15L0 21.07z" fill="%231664ff"/><path d="m9.7 4.93 7.64-3.83v16.15L9.7 21.07z" fill="%231664ff"/><path d="m19.4 4.93 7.64-3.83v16.15l-7.64 3.82z" fill="%231664ff"/></svg>'>
  <style>
    :root {
      --bg-start: #f8f9ff;
      --bg-mid: #f1f7ff;
      --bg-end: #eef4ff;
      --brand-blue: #1664ff;
      --text-strong: #17191f;
      --text-muted: #7d8798;
      --card-border: rgba(40, 57, 92, 0.08);
      --card-shadow: 0 24px 54px rgba(57, 79, 119, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      font-family:
        "BytePlus Sans",
        "Segoe UI",
        "Helvetica Neue",
        Arial,
        sans-serif;
      background: var(--bg-start);
      color: var(--text-strong);
    }

    .auth-page {
      position: relative;
      width: 100vw;
      min-width: 320px;
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 52% 44%, rgba(255, 255, 255, 0.58), transparent 32%),
        linear-gradient(112deg, var(--bg-start) 0%, var(--bg-mid) 58%, var(--bg-end) 100%);
      isolation: isolate;
    }

    .auth-page::before {
      position: absolute;
      inset: 0;
      z-index: -4;
      content: "";
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.28), transparent 28%),
        radial-gradient(circle at 82% 4%, rgba(226, 228, 255, 0.56), transparent 31%);
      pointer-events: none;
    }

    .background-3d {
      position: absolute;
      inset: 0;
      z-index: -3;
      display: none;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .prototype-bottom-art {
      position: absolute;
      bottom: 0;
      left: 0;
      z-index: -3;
      display: block;
      width: 100%;
      height: 31.111vh;
      object-fit: fill;
      pointer-events: none;
      user-select: none;
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, rgba(0, 0, 0, 0.18) 12%, #000 26%);
      mask-image: linear-gradient(to bottom, transparent 0%, rgba(0, 0, 0, 0.18) 12%, #000 26%);
    }

    .brand {
      position: absolute;
      top: 32px;
      left: 40px;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 0;
      width: 120px;
      height: 24px;
      color: #3b3d43;
      text-decoration: none;
    }

    .brand-image {
      display: block;
      width: 120px;
      height: 24px;
      object-fit: contain;
    }

    .status-card {
      position: absolute;
      top: 31.1vh;
      left: 50%;
      z-index: 2;
      display: flex;
      width: 333px;
      min-height: 239px;
      padding: 31.5px 30px 29.5px;
      transform: translateX(-50%);
      flex-direction: column;
      align-items: center;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.76);
      box-shadow: var(--card-shadow);
      backdrop-filter: blur(18px);
    }

    .status-illustration {
      position: relative;
      width: 80px;
      height: 92px;
      margin: 0 0 8px;
      flex: 0 0 auto;
    }

    .status-illustration svg,
    .status-illustration img {
      position: absolute;
      top: 6px;
      left: 0;
      display: block;
      width: 80px;
      height: 80px;
      overflow: visible;
    }

    .status-illustration .failure-art {
      display: none;
    }

    .status-title {
      width: 100%;
      max-width: 273px;
      min-height: 24px;
      max-height: 48px;
      margin: 0 0 8px;
      overflow: hidden;
      font-size: 18px;
      font-weight: 600;
      line-height: 24px;
      text-align: center;
      overflow-wrap: anywhere;
    }

    .status-copy {
      width: 273px;
      margin: 0;
      color: var(--text-muted);
      font-size: 15px;
      font-weight: 400;
      line-height: 22px;
      text-align: center;
    }

    .soft-mark {
      position: absolute;
      z-index: -2;
      width: 10px;
      height: 23px;
      border-radius: 1px;
      background: rgba(232, 235, 255, 0.72);
      pointer-events: none;
    }

    .soft-mark.one {
      top: 197px;
      left: 340px;
    }

    .soft-mark.two {
      top: 220px;
      left: 161px;
      opacity: 0.56;
    }

    .lower-haze {
      position: absolute;
      right: -2%;
      bottom: -72px;
      z-index: -3;
      width: 66%;
      height: 178px;
      border-radius: 100% 0 0 0 / 64% 0 0 0;
      background:
        linear-gradient(174deg, rgba(255, 255, 255, 0) 0%, rgba(230, 240, 255, 0.24) 48%, rgba(249, 252, 255, 0.9) 100%);
      box-shadow: inset 0 1px 0 rgba(128, 172, 255, 0.08);
      pointer-events: none;
    }

    .bottom-left-shape {
      position: absolute;
      bottom: -236px;
      left: -248px;
      z-index: -2;
      width: 622px;
      height: 384px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 45% 76%, rgba(255, 255, 255, 0.98) 0 18%, transparent 30%),
        radial-gradient(circle at 72% 34%, rgba(84, 178, 255, 0.16), transparent 49%),
        linear-gradient(148deg, rgba(87, 222, 237, 0.34), rgba(212, 236, 255, 0.22) 57%, rgba(249, 252, 255, 0.08));
      box-shadow:
        inset 0 22px 40px rgba(255, 255, 255, 0.88),
        0 -4px 22px rgba(72, 202, 226, 0.12);
      transform: rotate(8deg);
      pointer-events: none;
    }

    .bottom-left-shape::before {
      position: absolute;
      top: 38px;
      left: 58px;
      width: 78%;
      height: 34%;
      content: "";
      border-top: 8px solid rgba(82, 196, 231, 0.2);
      border-radius: 52% 48% 0 0 / 100% 100% 0 0;
      filter: blur(2px);
      transform: rotate(9deg);
    }

    .bottom-left-shape::after {
      position: absolute;
      right: 44px;
      bottom: 54px;
      width: 63%;
      height: 24%;
      content: "";
      border-top: 16px solid rgba(255, 255, 255, 0.46);
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
      filter: blur(7px);
    }

    .bottom-right-shape {
      position: absolute;
      right: -126px;
      bottom: -342px;
      z-index: -2;
      width: 792px;
      height: 472px;
      border-radius: 55% 45% 0 0 / 100% 92% 0 0;
      background:
        radial-gradient(circle at 31% 20%, rgba(255, 255, 255, 0.9) 0 7%, transparent 15%),
        radial-gradient(circle at 26% 47%, rgba(229, 119, 255, 0.5), transparent 35%),
        radial-gradient(circle at 72% 30%, rgba(42, 145, 255, 0.66), transparent 47%),
        linear-gradient(124deg, rgba(236, 226, 255, 0.56), rgba(123, 98, 255, 0.7) 50%, rgba(43, 190, 226, 0.7));
      box-shadow:
        inset 18px 28px 36px rgba(255, 255, 255, 0.62),
        inset -34px -16px 58px rgba(13, 113, 235, 0.13),
        0 -16px 40px rgba(81, 134, 255, 0.12);
      opacity: 0.84;
      filter: saturate(0.86);
      transform: rotate(-7deg);
      pointer-events: none;
    }

    .bottom-right-shape::before {
      position: absolute;
      top: 18px;
      left: 32px;
      width: 80%;
      height: 40%;
      content: "";
      border-top: 5px solid rgba(255, 255, 255, 0.48);
      border-radius: 52% 48% 0 0 / 100% 100% 0 0;
      filter: blur(1.5px);
    }

    .bottom-right-shape::after {
      position: absolute;
      right: 62px;
      bottom: 30px;
      width: 31%;
      height: 52%;
      content: "";
      background: linear-gradient(142deg, rgba(70, 118, 255, 0.18), rgba(18, 150, 232, 0.26));
      clip-path: polygon(32% 0, 100% 48%, 70% 100%, 0 48%);
      filter: blur(0.5px);
      opacity: 0.34;
    }

    .lower-haze,
    .bottom-left-shape,
    .bottom-right-shape {
      display: none;
    }

    html[data-state="error"] .success-art {
      display: none;
    }

    html[data-state="error"] .failure-art {
      display: block;
    }

    @media (max-width: 640px) {
      body {
        overflow: auto;
      }

      .auth-page {
        min-height: 620px;
      }

      .brand {
        top: 24px;
        left: 24px;
      }

      .status-card {
        top: 176px;
        width: calc(100vw - 48px);
        max-width: 333px;
      }

      .bottom-right-shape {
        right: -266px;
        bottom: -328px;
        transform: rotate(-7deg) scale(0.74);
      }

      .bottom-left-shape {
        bottom: -248px;
        left: -302px;
        transform: rotate(8deg) scale(0.74);
      }

      .soft-mark.one,
      .soft-mark.two {
        display: none;
      }
    }
  </style>
</head>

  <script>
    (() => {
      const callbackError = __CALLBACK_ERROR__;
      const errorText = callbackError.trim();
      const hasError = errorText !== "";
      const title = hasError
        ? errorText || "Authentication failed"
        : "Authentication successful";

      // 后端已经统一处理 error/Error/error_description 的优先级，这里只根据注入结果切换状态。
      // 错误文本通过 textContent 写入，避免 OAuth 错误内容被当作 HTML 执行。
      document.documentElement.dataset.state = hasError ? "error" : "success";
      document.title = hasError ? "BytePlus Authentication Failed" : "BytePlus Authentication Successful";

      const statusTitle = document.getElementById("statusTitle");
      statusTitle.textContent = title;
      statusTitle.title = title;
    })();
  </script>
